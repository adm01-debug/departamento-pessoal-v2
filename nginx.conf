events{worker_connections 1024;}http{include /etc/nginx/mime.types;default_type application/octet-stream;sendfile on;keepalive_timeout 65;server{listen 80;server_name localhost;root /usr/share/nginx/html;index index.html;location /{try_files \ \/ /index.html;}location /api{proxy_pass http://backend:3001;proxy_http_version 1.1;proxy_set_header Upgrade \;proxy_set_header Connection 'upgrade';proxy_set_header Host \;proxy_cache_bypass \;}}}
