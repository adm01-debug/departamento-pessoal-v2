version: "2"
checks:
  argument-count:
    enabled: true
    config:
      threshold: 5
  complex-logic:
    enabled: true
    config:
      threshold: 5
  file-lines:
    enabled: true
    config:
      threshold: 300
  method-complexity:
    enabled: true
    config:
      threshold: 10
  method-count:
    enabled: true
    config:
      threshold: 15
  method-lines:
    enabled: true
    config:
      threshold: 30
  nested-control-flow:
    enabled: true
    config:
      threshold: 4
  return-statements:
    enabled: true
    config:
      threshold: 5
  similar-code:
    enabled: true
    config:
      threshold: 40
  identical-code:
    enabled: true
    config:
      threshold: 30

plugins:
  eslint:
    enabled: true
    channel: eslint-8
  duplication:
    enabled: true
    config:
      languages:
        typescript:
          mass_threshold: 50

exclude_patterns:
  - "node_modules/"
  - "dist/"
  - "coverage/"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.stories.tsx"
  - "**/__mocks__/"
