sonar.projectKey=departamento-pessoal
sonar.projectName=Departamento Pessoal
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/*.stories.tsx,**/dist/**,**/coverage/**

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.stories.tsx,**/mocks/**,**/__tests__/**

sonar.cpd.exclusions=**/*.stories.tsx

sonar.sourceEncoding=UTF-8

# Quality Gates
sonar.qualitygate.wait=true

# Code Smells
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.ts
