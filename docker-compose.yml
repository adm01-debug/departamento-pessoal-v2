version: '3.8'
services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - VITE_API_URL=http://api:3001/api
    depends_on:
      - api
  api:
    image: node:18-alpine
    working_dir: /app
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
    command: npm run dev
