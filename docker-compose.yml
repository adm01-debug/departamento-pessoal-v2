version:'3.8'
services:
  frontend:
    build: .
    ports:
      - '3000:80'
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3001/api
  backend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - '3001:3001'
    command: npm run dev
