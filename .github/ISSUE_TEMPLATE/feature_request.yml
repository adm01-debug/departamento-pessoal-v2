name: ✨ Feature Request
description: Sugerir uma nova funcionalidade
title: "[FEATURE] "
labels: ["enhancement", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por sugerir uma melhoria! 

  - type: textarea
    id: problem
    attributes:
      label: Qual problema isso resolve?
      description: Descreva o problema que você está enfrentando
      placeholder: Eu sempre preciso...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solução Proposta
      description: Como você imagina que isso deveria funcionar?
      placeholder: Seria ótimo se...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas Consideradas
      description: Você pensou em outras formas de resolver isso?

  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      options:
        - Alta (bloqueador)
        - Média (importante)
        - Baixa (nice to have)
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribuição
      options:
        - label: Eu posso contribuir com a implementação
