name: 🐛 Bug Report
description: Reportar um bug ou comportamento inesperado
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar um bug! Por favor, preencha os campos abaixo.

  - type: textarea
    id: description
    attributes:
      label: Descrição do Bug
      description: Descreva claramente o problema
      placeholder: O que aconteceu?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Passos para Reproduzir
      description: Como podemos reproduzir o problema?
      placeholder: |
        1. Vá para '...'
        2. Clique em '...'
        3. Veja o erro
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento Esperado
      description: O que deveria acontecer?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento Atual
      description: O que realmente acontece?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severidade
      options:
        - Crítico (sistema não funciona)
        - Alto (funcionalidade importante quebrada)
        - Médio (problema que tem workaround)
        - Baixo (problema cosmético)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versão
      placeholder: ex. v18.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Ambiente
      description: Browser, OS, Node version, etc
      placeholder: |
        - Browser: Chrome 120
        - OS: macOS 14
        - Node: 20.10.0
