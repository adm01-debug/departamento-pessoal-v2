name: Security Scan & Code Quality

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight

jobs:
  security:
    name: Dependency & Code Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bun Audit
        # `bun pm audit` não existe — o comando é `bun audit`. Gate em
        # high/critical para não quebrar a main com advisories de baixo risco.
        run: bun audit --audit-level=high

      - name: Run SonarCloud Scan (Optional/Placeholder)
        run: echo "SonarCloud scan would run here if configured"

      - name: Snyk Security Scan (Optional/Placeholder)
        run: echo "Snyk scan would run here if configured"

